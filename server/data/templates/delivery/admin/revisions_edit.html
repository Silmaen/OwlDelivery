{% extends 'base.html' %}

{% block content %}
<div class="pkg-list">
    <div class="card">
        <div class="card__header">
            <h2>Branch: {{ branch_name }}</h2>
        </div>
        <div class="card__body">
            {% if new_revision %}
            <div class="alert alert--success">The revision has been modified.</div>
            <a class="btn" href="{% url 'a_revisions' %}">
                <span class="material-symbols-outlined icon">arrow_back</span>
                Return
            </a>
            {% else %}
            <form method="post" class="w-full">
                {% csrf_token %}
                {{ rev_form.as_p }}
                <div class="form-actions">
                    <a class="btn btn--ghost" href="{% url 'a_revisions' %}">
                        <span class="material-symbols-outlined icon">arrow_back</span>
                        Return
                    </a>
                    {% if perms.delivery.delete_newsentry %}
                    <button type="submit" class="btn btn--primary">
                        <span class="material-symbols-outlined icon">send</span>
                        Submit
                    </button>
                    {% endif %}
                </div>
            </form>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
