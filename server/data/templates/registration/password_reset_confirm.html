{% extends 'registration/base_registration.html' %}

{% block mainsection %}
<div class="auth-card card">
    <div class="card__header">
        <h2>Password reinitialization</h2>
    </div>
    <div class="card__body">
        <p>Input twice your new password to verify prompt.</p>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            {% include "includes/form_field.html" %}
            {% endfor %}
            <div class="form-actions">
                <button type="submit" class="btn btn--primary">
                    <span class="material-symbols-outlined icon">password</span>
                    Submit
                </button>
            </div>
        </form>
    </div>
    <div class="card__footer">
        <div class="card__footer-start">
            <a class="btn btn--ghost btn--sm" href="{% url 'login' %}">
                <span class="material-symbols-outlined icon">arrow_circle_left</span>
                Back
            </a>
        </div>
        <div class="card__footer-center"></div>
        <div class="card__footer-end"></div>
    </div>
</div>
{% endblock %}
